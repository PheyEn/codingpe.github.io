<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zoom Tunnel</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
  <div class="zoom-container">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" id="bg1" class="zoom-layer" />
    <img src="https://images.unsplash.com/photo-1581291519195-ef11498d1cf5" id="zoom1" class="zoom-layer" />
    <img src="https://images.unsplash.com/photo-1610564558474-2f3a40c06f09" id="zoom2" class="zoom-layer" />

    <div class="overlay" id="text1">
      <h1>Scene 1</h1>
      <p>You’ve focused into the first layer.</p>
    </div>

    <div class="overlay" id="text2">
      <h1>Scene 2</h1>
      <p>Now you’re deeper — the second scene appears.</p>
    </div>
  </div>

  <div class="spacer"></div>

  <script src="script.js"></script>
</body>
</html>
